<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iOS 26 液态玻璃</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    min-height: 100vh;
    background: #000;
    overflow-x: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    color: #fff;
  }
  
  .bg {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 20% 30%, #ff6ec7 0%, transparent 40%),
      radial-gradient(circle at 80% 70%, #7873f5 0%, transparent 40%),
      radial-gradient(circle at 50% 50%, #4ade80 0%, transparent 35%);
    filter: blur(90px);
    opacity: 0.75;
    z-index: 0;
    animation: bgMove 8s ease-in-out infinite alternate;
  }
  
  @keyframes bgMove {
    0% { transform: scale(1) translate(0, 0); }
    100% { transform: scale(1.15) translate(-2%, 3%); }
  }
  
  .glass {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 380px;
    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(28px) saturate(220%);
    -webkit-backdrop-filter: blur(28px) saturate(220%);
    border-radius: 34px;
    border: 1px solid rgba(255, 255, 255, 0.45);
    box-shadow:
      0 30px 80px rgba(0, 0, 0, 0.45),
      0 0 0 1px rgba(255, 255, 255, 0.08),
      inset 0 1px 0 rgba(255, 255, 255, 0.65);
    padding: 44px 28px 36px;
    overflow: hidden;
  }
  
  .glass::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 45%;
    background: linear-gradient(180deg, rgba(255,255,255,0.35), transparent);
    border-radius: 34px 34px 0 0;
    pointer-events: none;
  }
  
  .icon-wrap {
    position: relative;
    width: 110px;
    height: 110px;
    margin: 0 auto 26px;
    border-radius: 30px;
    background: rgba(255, 255, 255, 0.18);
    border: 1px solid rgba(255, 255, 255, 0.5);
    box-shadow:
      0 20px 50px rgba(120, 115, 245, 0.35),
      inset 0 1px 0 rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(14px);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 54px;
  }
  
  h1 {
    text-align: center;
    font-size: 34px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.25);
  }
  
  .subtitle {
    text-align: center;
    font-size: 13px;
    opacity: 0.85;
    margin: 8px 0 26px;
    letter-spacing: 0.6px;
  }
  
  .btn {
    width: 100%;
    padding: 17px;
    margin-bottom: 14px;
    border-radius: 18px;
    border: 1px solid rgba(255, 255, 255, 0.45);
    background: rgba(255, 255, 255, 0.18);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    box-shadow:
      0 15px 35px rgba(0,0,0,0.18),
      inset 0 1px 0 rgba(255, 255, 255, 0.55);
    transition: transform .2s ease, background .2s ease;
  }
  
  .btn:hover {
    background: rgba(255, 255, 255, 0.28);
    transform: translateY(-2px);
  }
  
  .btn.secondary {
    background: rgba(255, 255, 255, 0.08);
    border-color: rgba(255, 255, 255, 0.25);
  }
  
  .grid {
    margin-top: 24px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  
  .card {
    border-radius: 22px;
    padding: 18px;
    text-align: center;
    background: rgba(255, 255, 255, 0.14);
    border: 1px solid rgba(255, 255, 255, 0.35);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    box-shadow:
      0 15px 40px rgba(0,0,0,0.18),
      inset 0 1px 0 rgba(255, 255, 255, 0.5);
    transition: transform .25s ease;
  }
  
  .card:hover {
    transform: translateY(-3px);
  }
  
  .value {
    font-size: 22px;
    font-weight: 700;
    text-shadow: 0 1px 6px rgba(0,0,0,0.2);
  }
  
  .label {
    margin-top: 6px;
    font-size: 12px;
    opacity: 0.8;
    letter-spacing: 0.4px;
  }
  
  .glow {
    position: fixed;
    width: 380px;
    height: 380px;
    border-radius: 50%;
    filter: blur(100px);
    opacity: 0.55;
    z-index: 0;
    animation: glow 10s ease-in-out infinite;
  }
  
  .glow.a { background: #ff6ec7; top: -120px; left: -120px; }
  .glow.b { background: #7873f5; bottom: -120px; right: -120px; animation-delay: 2s; }
  .glow.c { background: #4ade80; top: 40%; left: 40%; animation-delay: 4s; }
  
  @keyframes glow {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(20px, -20px) scale(1.1); }
  }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="glow a"></div>
  <div class="glow b"></div>
  <div class="glow c"></div>
  
  <div class="glass">
    <div class="icon-wrap">🍎</div>
    <h1>iOS 26</h1>
    <p class="subtitle">LIQUID GLASS UI</p>
    
    <button class="btn">探索新功能</button>
    <button class="btn secondary">了解更多</button>
    
    <div class="grid">
      <div class="card">
        <div class="value">全新</div>
        <div class="label">设计系统</div>
      </div>
      <div class="card">
        <div class="value">灵动</div>
        <div class="label">交互体验</div>
      </div>
      <div class="card">
        <div class="value">智能</div>
        <div class="label">AI 功能</div>
      </div>
      <div class="card">
        <div class="value">隐私</div>
        <div class="label">安全保护</div>
      </div>
    </div>
  </div>
</body>
</html>
